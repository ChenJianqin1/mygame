# ─── API DECISIONS ───────────────────────────────────────────────────────────
# Which engine APIs are chosen for which purpose across the project.
# Conflicts: two ADRs using different APIs for the same purpose = inconsistent
# implementation that breaks when one system expects the other's API.
#
# Register an API decision when the choice is non-obvious and other ADRs might
# make a different choice for the same purpose without knowing this was decided.

api_decisions:
  - purpose: cross_system_signal_routing
    status: active
    api: Events Autoload singleton
    not: Direct Node references between systems
    not: Hybrid routing (mixed Events + direct)
    reason: "Central bus provides loose coupling, testability, and observability. Direct node references create tight coupling and fragile dependencies."
    adr: docs/architecture/adr-0001-events-autoload.md
    referenced_by:
      - docs/architecture/adr-0001-events-autoload.md
    added: 2026-04-17
    revised: ""

  - purpose: hitbox_hurtbox_collision
    status: active
    api: Area2D spawn-in/spawn-out
    not: CharacterBody + move_and_collide()
    not: StaticBody + RayCast2D
    reason: "Area2D provides precise shape-based overlap detection; spawn-in/out matches attack animation timing; pool avoids GC"
    adr: docs/architecture/adr-0002-collision-detection.md
    referenced_by:
      - docs/architecture/adr-0002-collision-detection.md
    added: 2026-04-17
    revised: ""

