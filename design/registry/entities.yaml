# ─── FORMULAS ─────────────────────────────────────────────────────────────────
# Named calculations with defined variables and output ranges.

formulas:
  - name: solo_multiplier
    status: active
    source: design/gdd/combo-system.md
    referenced_by:
      - design/gdd/combo-system.md
      - design/gdd/combat-system.md
    variables:
      - combo_count
    expression: "min(1.0 + combo_count * 0.05, 3.0)"
    output_range: [1.0, 3.0]
    output_unit: multiplier
    notes: "单人连击伤害倍率，上限40连击（3.0x）。战斗系统使用此公式计算final_damage。"
    added: "2026-04-17"

  - name: sync_multiplier
    status: active
    source: design/gdd/combo-system.md
    referenced_by:
      - design/gdd/combo-system.md
    variables:
      - combo_count
    expression: "min(1.0 + combo_count * 0.05, 4.0)"
    output_range: [1.0, 4.0]
    output_unit: multiplier
    notes: "同步连击伤害倍率，上限60连击（4.0x）。高于solo的4.0x上限体现协作奖励。"
    added: "2026-04-17"

  - name: combo_window_decay
    status: active
    source: design/gdd/combo-system.md
    referenced_by:
      - design/gdd/combo-system.md
    variables:
      - time_since_last_hit
      - COMBO_WINDOW_DURATION
    expression: "combo_resets = (time_since_last_hit >= COMBO_WINDOW_DURATION)"
    output_range: "[bool]"
    output_unit: boolean
    notes: "连击窗口计时器，超时则combo_count重置为0。真实秒数，不受hitstop影响。"
    added: "2026-04-17"

  - name: sync_detection
    status: active
    source: design/gdd/combo-system.md
    referenced_by:
      - design/gdd/combo-system.md
    variables:
      - P1_hit_frame
      - P2_hit_frame
      - SYNC_WINDOW
    expression: "is_sync = (abs(P1_hit_frame - P2_hit_frame) <= SYNC_WINDOW)"
    output_range: "[bool]"
    output_unit: boolean
    notes: "P1和P2在5帧窗口内命中即为SYNC。"
    added: "2026-04-17"

  - name: damage_formula
    status: active
    source: design/gdd/combat-system.md
    referenced_by:
      - design/gdd/combat-system.md
    variables:
      - base_damage
      - attack_type_multiplier
      - combo_multiplier
    expression: "final_damage = base_damage * attack_type_multiplier * combo_multiplier"
    output_range: [6, 120]
    output_unit: damage
    notes: "战斗系统伤害公式。combo_multiplier来自ComboSystem的get_combo_multiplier()方法。"
    added: "2026-04-17"

  - name: hitstop_frames
    status: active
    source: design/gdd/combat-system.md
    referenced_by:
      - design/gdd/combat-system.md
    variables:
      - attack_type
      - target_type
    expression: "hitstop_frames = base_hitstop[attack_type] + bonus_hitstop[target_type]"
    output_range: [3, 14]
    output_unit: frames
    notes: "LIGHT=3帧，MEDIUM=5帧，HEAVY=8帧，SPECIAL=12帧；Boss被命中额外+2帧。"
    added: "2026-04-17"

  - name: boss_max_hp
    status: active
    source: design/gdd/combat-system.md
    referenced_by:
      - design/gdd/combat-system.md
      - design/gdd/boss-ai-system.md
    variables:
      - BASE_BOSS_HP
      - progression_multiplier
      - boss_index_multiplier
      - coop_scaling
    expression: "floor(BASE_BOSS_HP * progression_multiplier * boss_index_multiplier * coop_scaling)"
    output_range: [750, 3000]
    output_unit: HP
    notes: "Boss最大HP。BASE_BOSS_HP=500，coop_scaling=1.5（双人）。"
    added: "2026-04-17"

  - name: boss_phase_hp
    status: active
    source: design/gdd/boss-ai-system.md
    referenced_by:
      - design/gdd/boss-ai-system.md
    variables:
      - hp_ratio
    expression: "current_phase = 1 if hp_ratio > 0.60 else 2 if hp_ratio > 0.30 else 3"
    output_range: "[1, 2, 3]"
    output_unit: phase_index
    notes: "Phase 1: 100%-60% HP, Phase 2: 60%-30%, Phase 3: 30%-0%。"
    added: "2026-04-17"

  - name: trauma_shake_offset
    status: active
    source: design/gdd/camera-system.md
    referenced_by:
      - design/gdd/camera-system.md
    variables:
      - trauma
      - max_offset
    expression: "shake_offset = trauma * trauma * max_offset"
    output_range: "[0, max_offset]"
    output_unit: pixels
    notes: "二次方衰减曲线，快攻慢衰减。trauma范围0.0-1.0，max_offset=(50, 35)px。"
    added: "2026-04-17"

  - name: effective_zoom
    status: active
    source: design/gdd/camera-system.md
    referenced_by:
      - design/gdd/camera-system.md
    variables:
      - BASE_ZOOM
      - player_distance_zoom
      - combat_state_zoom
      - boss_phase_zoom
    expression: "BASE_ZOOM × player_distance_zoom × combat_state_zoom × boss_phase_zoom"
    output_range: [0.7, 1.0]
    output_unit: zoom_factor
    notes: "玩家距离<200px→1.0x, 200-400px→0.85x, >400px→0.7x。"
    added: "2026-04-17"

  - name: rescue_timer
    status: active
    source: design/gdd/coop-system.md
    referenced_by:
      - design/gdd/coop-system.md
    variables:
      - time_since_down
      - RESCUE_WINDOW
    expression: "player_out = (RESCUE_WINDOW - time_since_down <= 0.0)"
    output_range: "[bool]"
    output_unit: boolean
    notes: "RESCUE_WINDOW=3.0秒，超时则玩家OUT。"
    added: "2026-04-17"

  - name: crisis_detection
    status: active
    source: design/gdd/coop-system.md
    referenced_by:
      - design/gdd/coop-system.md
    variables:
      - P1_hp
      - P2_hp
      - PLAYER_MAX_HP
      - CRISIS_HP_THRESHOLD
    expression: "is_crisis = (P1_hp < PLAYER_MAX_HP * 0.30) AND (P2_hp < PLAYER_MAX_HP * 0.30)"
    output_range: "[bool]"
    output_unit: boolean
    notes: "双玩家HP均低于30%时触发CRISIS状态。"
    added: "2026-04-17"

  - name: coop_damage_bonus
    status: active
    source: design/gdd/coop-system.md
    referenced_by:
      - design/gdd/coop-system.md
      - design/gdd/combat-system.md
    variables:
      - base_damage
      - attack_type_multiplier
      - combo_multiplier
      - COOP_BONUS
    expression: "effective_damage = base_damage * attack_type_multiplier * (1.0 + combo_multiplier) * (1.0 + COOP_BONUS)"
    output_range: "[10.56, 220]"
    output_unit: damage
    notes: "COOP_BONUS=0.10（+10%），双玩家均存活时生效。attack_type_multiplier来自战斗系统。# was: base_damage * (1.0 + combo_multiplier) * (1.0 + COOP_BONUS) — attack_type_multiplier was missing before 2026-04-17"
    added: "2026-04-17"
    revised: "2026-04-17"

  - name: solo_damage_reduction
    status: active
    source: design/gdd/coop-system.md
    referenced_by:
      - design/gdd/coop-system.md
    variables:
      - incoming_damage
      - SOLO_DAMAGE_REDUCTION
    expression: "effective_damage = incoming_damage * (1.0 - SOLO_DAMAGE_REDUCTION)"
    output_range: "[0.75, 1.0] × incoming"
    output_unit: damage
    notes: "SOLO_DAMAGE_REDUCTION=0.25（25%减免），单人时生效。与CRISIS不叠加。"
    added: "2026-04-17"

  - name: compression_speed
    status: active
    source: design/gdd/boss-ai-system.md
    referenced_by:
      - design/gdd/boss-ai-system.md
    variables:
      - BASE_COMPRESSION_SPEED
      - phase_multiplier
      - rescue_multiplier
      - crisis_multiplier
    expression: "BASE_COMPRESSION_SPEED * phase_multiplier * rescue_multiplier * crisis_multiplier"
    output_range: [16, 64]
    output_unit: px/s
    notes: "BASE=32px/s。Phase 1=1.0x, Phase2=1.5x, Phase3=2.0x。救援时×0.5，CRISIS时×1.2。"
    added: "2026-04-17"

  - name: combo_tier_threshold
    status: active
    source: design/gdd/combo-system.md
    referenced_by:
      - design/gdd/combo-system.md
      - design/gdd/ui-system.md
    variables:
      - combo_count
    expression: "tier = 0 if combo==0 else 1 if <=9 else 2 if <=19 else 3 if <=39 else 4"
    output_range: [0, 4]
    output_unit: tier_index
    notes: "Tier 0=IDLE, 1=1-9, 2=10-19, 3=20-39, 4=40+。"
    added: "2026-04-17"

