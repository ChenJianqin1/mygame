# ─── INTERFACE CONTRACTS ──────────────────────────────────────────────────────
# How systems are required to communicate with each other.
# Conflicts: one ADR expects signal, another expects direct call = integration bug.
#
# Register a contract when the communication pattern between two systems is
# explicitly decided in an ADR and other systems must follow the same pattern.
#
# pattern options: signal | direct_call | event_bus | shared_resource | rpc | none

interfaces:
  - contract: signal_bus_routing
    status: active
    pattern: event_bus
    description: "All cross-system signals route through Events Autoload singleton. Exceptions are documented in the ADR."
    producer_rule: "Emit signal via Events.<signal_name>.emit()"
    consumer_rule: "Connect in _ready() via Events.<signal_name>.connect(callable)"
    exceptions:
      - signal: hit_landed
        route: direct
        reason: "High-frequency, low-latency requirement for VFX hit feedback"
        producer: combat-system
        consumer: vfx-manager
    adr: docs/architecture/adr-0001-events-autoload.md
    referenced_by:
      - docs/architecture/adr-0001-events-autoload.md
      - docs/architecture/adr-0002-collision-detection.md
      - docs/architecture/adr-0003-combat-state-machine.md
      - docs/architecture/adr-0004-combo-system.md
      - docs/architecture/adr-0005-coop-system.md
    added: 2026-04-17
    revised: ""

  - contract: no_circular_signal_dependencies
    status: active
    pattern: forbidden
    description: "Systems must not form circular signal dependencies where A emits a signal that B consumes, while B also emits a signal that A consumes."
    adr: docs/architecture/adr-0001-events-autoload.md
    referenced_by:
      - docs/architecture/adr-0001-events-autoload.md
    added: 2026-04-17
    revised: ""

  - contract: ai_sensor_routing
    status: active
    pattern: direct_call
    description: "Boss AI perception signals (player_detected, player_lost, player_hurt) route directly from CollisionManager to BossAI, not via Events."
    producer: collision-detection-system
    consumers:
      - boss-ai-system
    signal_signature: "player_detected(player: Node2D), player_lost(player: Node2D), player_hurt(player: Node2D, damage: float)"
    reason: "AI perception requires lowest possible latency; direct routing avoids Events dispatch overhead"
    adr: docs/architecture/adr-0002-collision-detection.md
    referenced_by:
      - docs/architecture/adr-0002-collision-detection.md
      - docs/architecture/adr-0006-boss-ai.md
    added: 2026-04-17
    revised: ""

  - contract: combo_hit_signal
    status: active
    pattern: event_bus
    description: "CombatSystem emits combo_hit to Events, Events routes to ComboSystem."
    producer: combat-system
    consumers:
      - combo-system
    signal_signature: "combo_hit(attack_type: String, combo_count: int, is_grounded: bool)"
    reason: "Cross-system notification of combat hits for combo tracking"
    adr: docs/architecture/adr-0003-combat-state-machine.md
    referenced_by:
      - docs/architecture/adr-0003-combat-state-machine.md
      - docs/architecture/adr-0004-combo-system.md
    added: 2026-04-17
    revised: ""

